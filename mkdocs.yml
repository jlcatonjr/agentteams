site_name: Agent Teams Module
site_description: Generate a complete, coordinated AI agent team for any project from a single description file.
site_url: https://jlcatonjr.github.io/agentteams/
repo_url: https://github.com/jlcatonjr/agentteams
repo_name: jlcatonjr/agentteams
edit_uri: edit/main/docs_src/
docs_dir: docs_src
site_dir: docs
use_directory_urls: true
site_author: jlcatonjr
extra:
  generator: false
copyright: "&copy; <span id='copyright-year'></span> jlcatonjr"
extra_javascript:
  - javascripts/current-year.js

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Manuscript: manuscript.md
  - Getting Started: getting-started.md
  - Agent-Assisted Setup: agent-assisted-setup.md
  - How It Works: how-it-works.md
  - Examples: examples.md
  - Interoperability: interoperability.md
  - CLI Reference: cli-reference.md
  - API Reference:
      - Overview: api-reference/index.md
      - Feature Inventory: api-reference/feature-inventory.md
      - ingest: api-reference/ingest.md
      - analyze: api-reference/analyze.md
      - render: api-reference/render.md
      - emit: api-reference/emit.md
      - convert: api-reference/convert.md
      - interop: api-reference/interop.md
      - bridge: api-reference/bridge.md
      - drift: api-reference/drift.md
      - scan: api-reference/scan.md
      - audit: api-reference/audit.md
      - remediate: api-reference/remediate.md
      - enrich: api-reference/enrich.md
      - graph: api-reference/graph.md
      - frameworks: api-reference/frameworks.md
      - man: api-reference/man.md
  - Template Authoring: template-authoring.md
  - Description Format: DESCRIPTION-FORMAT.md
  - Structural Update Plan: structural-update-plan.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true
