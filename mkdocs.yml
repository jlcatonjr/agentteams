site_name: Agent Teams Module
site_description: Generate a complete, coordinated AI agent team for any project from a single description file.
site_url: https://jlcatonjr.github.io/agentteams/
repo_url: https://github.com/jlcatonjr/agentteams
repo_name: jlcatonjr/agentteams
edit_uri: edit/main/docs_src/
docs_dir: docs_src
site_dir: docs
use_directory_urls: true
site_author: jlcatonjr
extra:
  generator: false
copyright: "&copy; <span id='copyright-year'></span> jlcatonjr"
extra_javascript:
  - javascripts/current-year.js

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Manuscript: manuscript.md
  - Getting Started: getting-started.md
  - Agent-Assisted Setup: agent-assisted-setup.md
  - How It Works: how-it-works.md
  - Examples: examples.md
  - CLI Reference: cli-reference.md
  - Guides:
      - Post-Production Auditor: post-production-auditor-guide.md
      - Security Hardening & Threat Intelligence: security-hardening-guide.md
      - Section Fencing & Safe Merges: section-fencing-guide.md
      - Update Lifecycle, Drift & Backups: update-lifecycle-guide.md
      - Detecting Stale Docs & Scripts: stale-detection-guide.md
      - Update Compatibility Maintenance: update-compatibility-maintenance-guide.md
      - Delivery Procedure: delivery-procedure.md
      - Migration Guide: migration-guide.md
      - Interoperability Patterns: interoperability-patterns-guide.md
      - Bridge CI Automation: bridge-ci-automation-guide.md
      - Enrichment Pipeline: enrichment-pipeline-guide.md
      - Cross-Repository Coordination: cross-repository-coordination-guide.md
      - Working with Your Generated Team: working-with-your-generated-team-guide.md
      - Verification Environment: verification-environment.md
  - Goose:
      - System Prep & Source/Model Switch: goose-system-prep.md
      - Cheat Sheet: goose-cheat-sheet.md
      - Cloud Providers: goose-cloud-providers.md
      - Privileges: goose-privileges.md
  - API Reference:
      - Overview: api-reference/index.md
      - ingest: api-reference/ingest.md
      - analyze: api-reference/analyze.md
      - manifest-format: api-reference/manifest-format.md
      - render: api-reference/render.md
      - emit: api-reference/emit.md
      - fences: api-reference/fences.md
      - convert: api-reference/convert.md
      - interop: api-reference/interop.md
      - bridge: api-reference/bridge.md
      - fleet: api-reference/fleet.md
      - drift: api-reference/drift.md
      - behavioral-drift: api-reference/behavioral-drift.md
      - scan: api-reference/scan.md
      - audit: api-reference/audit.md
      - remediate: api-reference/remediate.md
      - security-refs: api-reference/security-refs.md
      - framework-research: api-reference/framework-research.md
      - enrich: api-reference/enrich.md
      - memory-index: api-reference/memory-index.md
      - fence-inject: api-reference/fence-inject.md
      - graph: api-reference/graph.md
      - model-routing: api-reference/model-routing.md
      - eval-suite: api-reference/eval-suite.md
      - eval-adapters: api-reference/eval-adapters.md
      - frameworks: api-reference/frameworks.md
      - man: api-reference/man.md
      - handoff_payloads: api-reference/handoff_payloads.md
      - plan_steps: api-reference/plan_steps.md
      - plan-steps-todo: api-reference/plan-steps-todo.md
      - parallel-plan: api-reference/parallel-plan.md
      - liaison-logs: api-reference/liaison-logs.md
      - host-features: api-reference/host-features.md
      - baseline: api-reference/baseline.md
      - bridge-subagents: api-reference/bridge-subagents.md
      - bridge-subagents-goose: api-reference/bridge-subagents-goose.md
      - bridge-sources: api-reference/bridge-sources.md
      - hooks-emit: api-reference/hooks-emit.md
      - instructions-split: api-reference/instructions-split.md
      - schedule-emit: api-reference/schedule-emit.md
      - mcp-detect: api-reference/mcp-detect.md
      - mcp-emit: api-reference/mcp-emit.md
      - goose-config: api-reference/goose-config.md
      - pr-management: api-reference/pr-management.md
  - Template Authoring: template-authoring.md
  - Description Format: DESCRIPTION-FORMAT.md
  - Structural Update Plan: structural-update-plan.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true
