name: AgentTeams Security Maintenance (Daily + Manual Fallback)

on:
  schedule:
    - cron: '0 13 * * *'  # 09:00 EDT (UTC-4) / 08:00 EST (UTC-5), daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  daily-security-maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: pip install -e ".[test]"

      - name: Run daily agentteams security maintenance (autonomous)
        run: bash scripts/run_daily_security_maintenance.sh
