name: Framework Auto-Update (Supervised PR)

# T3a.1: cron enabled after branch protection set on `main`.
# Verification (2026-05-25): `gh api .../branches/main/protection` returns
# required_pull_request_reviews (0 approvals — solo-maintainer policy),
# allow_force_pushes=false, allow_deletions=false. Direct pushes blocked;
# auto-PRs from this workflow flow through the PR review surface.
# Plans:
#   references/plans/T3-1-enable-auto-pr-cron-2026-05-25.plan.md
#   references/plans/T2-D3-ci-auto-pr-2026-05-25.plan.md

on:
  schedule:
    - cron: "23 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  propose-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        # pytest needed for the framework_research --apply test gate.
        # Matches the bridge-maintenance.yml install pattern.
        run: pip install -e ".[test]"

      - name: Refresh framework-research snapshot
        run: python scripts/research_claude_code_docs.py

      - name: Produce module-core proposal
        id: propose
        run: |
          python scripts/research_claude_code_docs.py --propose
          proposal=tmp/daily-pipeline/framework-research/proposal.json
          if [[ ! -s "$proposal" ]]; then
            echo "no_proposal=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changes=$(python -c "import json; print(len(json.load(open('$proposal'))['changes']))")
          if [[ "$changes" -eq 0 ]]; then
            echo "no_proposal=true" >> "$GITHUB_OUTPUT"
          else
            # Use the module's dedup_hash field (proposal schema 1.2+). It is
            # computed over upstream tokens + adapter constants only — NOT
            # over the rendered new_text (which contains today's date), so
            # day-over-day runs with identical observations produce the same
            # hash and the workflow's existing dedup step finds the open PR.
            phash=$(python -c "import json; d=json.load(open('$proposal')); print(d.get('dedup_hash') or d.get('changes', [{}])[0].get('path','unknown'))")
            echo "phash=$phash" >> "$GITHUB_OUTPUT"
            echo "branch=auto/framework-update-$phash" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing PR with same hash
        if: steps.propose.outputs.no_proposal != 'true'
        id: dedupe
        env:
          GH_TOKEN: ${{ github.token }}
          PHASH: ${{ steps.propose.outputs.phash }}
        run: |
          existing=$(gh pr list --state open --search "head:auto/framework-update-$PHASH" --json number --jq '.[0].number // empty')
          if [[ -n "$existing" ]]; then
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
            echo "Existing open PR #$existing matches proposal hash $PHASH; skipping."
          fi

      - name: Apply proposal on branch
        if: steps.propose.outputs.no_proposal != 'true' && steps.dedupe.outputs.duplicate != 'true'
        env:
          AGENTTEAMS_ALLOW_CI_APPLY: "1"
          BRANCH: ${{ steps.propose.outputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          python scripts/research_claude_code_docs.py --apply
          git add -A
          if git diff --cached --quiet; then
            echo "Apply produced no diff (proposal already reflected in tree); exiting."
            exit 0
          fi
          git commit -m "auto(framework-update): record observed upstream tokens" \
                     -m "Generated by .github/workflows/framework-auto-update.yml from tmp/daily-pipeline/framework-research/proposal.json. Open the diff for the dated observation stanzas in references/claude-agent-infrastructure-expert.md and references/copilot-agent-infrastructure-expert.md." \
                     -m "Human review required before merge; this PR must not auto-merge."
          git push --set-upstream origin "$BRANCH"

      - name: Open PR
        if: steps.propose.outputs.no_proposal != 'true' && steps.dedupe.outputs.duplicate != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.propose.outputs.branch }}
          PHASH: ${{ steps.propose.outputs.phash }}
        run: |
          # Skip if branch didn't get pushed (apply was no-op).
          if ! git ls-remote --exit-code origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH was not pushed; nothing to PR."
            exit 0
          fi
          body_file="$(mktemp)"
          {
            echo "Generated by \`.github/workflows/framework-auto-update.yml\`."
            echo
            echo "This PR appends a dated \`## Observed Upstream Tokens\` stanza to one or"
            echo "both expert references when the daily framework-research stage detected"
            echo "drift against the local adapter constants."
            echo
            echo "**Review required:**"
            echo "- Diff confirms only \`references/*-agent-infrastructure-expert.md\` changed."
            echo "- New tokens reflect legitimate upstream documentation, not scan noise."
            echo "- Merging this PR does NOT mutate \`agentteams/frameworks/claude.py\` constants —"
            echo "  that change is still gated on a structured upstream signal (see"
            echo "  \`references/plans/F4-claude-upstream-signal-feasibility-2026-05-25.md\`)."
            echo
            echo "Hash: \`$PHASH\`"
          } > "$body_file"
          # rc.4: the daily pipeline implements revisions automatically.
          # PRs created by GITHUB_TOKEN do not trigger CI (GitHub's
          # infinite-loop safeguard), nor does the merge event itself.
          # rc.5 closes the resulting safety-net gap by explicitly
          # dispatching ci.yml against main after the merge —
          # workflow_dispatch is exempt from the GITHUB_TOKEN filter.
          pr_url=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "auto: framework upstream-token observation ($PHASH)" \
            --body-file "$body_file" \
            --label "framework-update")
          pr_num=$(basename "$pr_url")
          echo "Opened PR: $pr_url"

          gh pr merge "$pr_num" --merge --delete-branch
          merged_sha=$(gh pr view "$pr_num" --json mergeCommit --jq '.mergeCommit.oid')
          echo "Merged as $merged_sha"

          # rc.5: dispatch CI on main so the broader test matrix runs
          # against the auto-merge commit. The dispatched run is the
          # restored post-merge safety net (rc.4 claimed this happened
          # via the normal push trigger; it does not, due to
          # GITHUB_TOKEN filtering).
          ci_run_url=""
          if gh workflow run ci.yml --ref main; then
            sleep 3
            ci_run_url=$(gh run list --workflow=ci.yml --limit 1 --json url --jq '.[0].url' || true)
            echo "Dispatched CI: $ci_run_url"
          else
            echo "WARN: CI dispatch failed; the auto-merge landed but post-merge CI did not fire" >&2
          fi

          # rc.4 post-execution report: emit a step summary so the run
          # log records exactly what landed on main this cycle.
          {
            echo "## Auto-update execution report"
            echo
            echo "- PR: $pr_url"
            echo "- Hash: \`$PHASH\`"
            echo "- Merge commit: \`$merged_sha\`"
            echo "- Branch: \`$BRANCH\` (deleted)"
            echo "- Post-merge CI: $ci_run_url"
            echo
            echo "### Diff scope"
            gh pr diff "$pr_num" --color never | head -200
          } >> "$GITHUB_STEP_SUMMARY" || true
