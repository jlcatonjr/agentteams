name: AgentTeams Bridge Watchdog

on:
  schedule:
    - cron: "11 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  bridge-watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Check last successful bridge maintenance run
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowId = "bridge-maintenance.yml";
            const staleHours = 48;
            const staleMs = staleHours * 60 * 60 * 1000;
            const now = Date.now();

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowId,
              status: "completed",
              per_page: 20,
            });

            const latestSuccess = runs.data.workflow_runs.find((run) => run.conclusion === "success");
            let isStale = false;
            let detail = "";

            if (!latestSuccess) {
              isStale = true;
              detail = "No successful bridge-maintenance workflow run found.";
            } else {
              const completedAt = Date.parse(latestSuccess.updated_at || latestSuccess.created_at);
              const ageMs = now - completedAt;
              const ageHours = Math.floor(ageMs / (60 * 60 * 1000));
              if (ageMs > staleMs) {
                isStale = true;
                detail = `Latest successful bridge-maintenance run is stale (${ageHours}h old).`;
              } else {
                detail = `Bridge-maintenance run is fresh (${ageHours}h old).`;
              }
            }

            const label = "bridge-watchdog";
            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: label,
              per_page: 100,
            });
            const existing = openIssues.data.find((issue) => issue.title.includes("Bridge Maintenance Stale"));

            if (isStale && !existing) {
              const body = [
                "Bridge maintenance appears stale.",
                "",
                `Detail: ${detail}`,
                "",
                `Workflow file checked: ${workflowId}`,
                `Threshold: ${staleHours} hours`,
                "",
                "Please review `.github/workflows/bridge-maintenance.yml` and `scripts/run_daily_bridge_maintenance.sh`.",
              ].join("\n");

              await github.rest.issues.create({
                owner,
                repo,
                title: "Bridge Maintenance Stale",
                body,
                labels: [label],
              });
              core.notice(`Opened stale bridge maintenance issue. ${detail}`);
            } else if (isStale && existing) {
              core.notice(`Stale condition detected, existing issue already open. ${detail}`);
            } else if (!isStale && existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Watchdog check passed: ${detail}`,
              });
              core.notice(`Fresh condition detected; noted status on existing issue #${existing.number}.`);
            } else {
              core.notice(detail);
            }
