name: AgentTeams Bridge Watchdog

on:
  schedule:
    - cron: "11 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  bridge-watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Find latest successful bridge-maintenance run
        id: find-run
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "bridge-maintenance.yml",
              status: "completed",
              per_page: 20,
            });
            const latestSuccess = runs.data.workflow_runs.find((r) => r.conclusion === "success");
            if (latestSuccess) {
              core.setOutput("run_id", String(latestSuccess.id));
              core.setOutput("updated_at", latestSuccess.updated_at || latestSuccess.created_at);
            } else {
              core.setOutput("run_id", "");
              core.setOutput("updated_at", "");
            }

      - name: Download latest bridge-maintenance artifact
        if: steps.find-run.outputs.run_id != ''
        id: download
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.find-run.outputs.run_id }}
        run: |
          mkdir -p artifact
          gh run download "$RUN_ID" \
            --repo "${{ github.repository }}" \
            --name bridge-maintenance-summary \
            --dir artifact || echo "download_failed=true" >>"$GITHUB_OUTPUT"

      - name: Evaluate staleness and manage issue
        uses: actions/github-script@v7
        env:
          RUN_UPDATED_AT: ${{ steps.find-run.outputs.updated_at }}
          DOWNLOAD_FAILED: ${{ steps.download.outputs.download_failed }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowId = "bridge-maintenance.yml";
            const staleHours = 48;
            const staleMs = staleHours * 60 * 60 * 1000;
            const now = Date.now();

            // Workflow-run age check (existing behaviour).
            const updatedAt = process.env.RUN_UPDATED_AT || "";
            let workflowStale = false;
            let workflowDetail = "";
            if (!updatedAt) {
              workflowStale = true;
              workflowDetail = "No successful bridge-maintenance workflow run found.";
            } else {
              const ageMs = now - Date.parse(updatedAt);
              const ageHours = Math.floor(ageMs / (60 * 60 * 1000));
              if (ageMs > staleMs) {
                workflowStale = true;
                workflowDetail = `Latest successful workflow run is stale (${ageHours}h old).`;
              } else {
                workflowDetail = `Workflow run is fresh (${ageHours}h old).`;
              }
            }

            // Snapshot age check (D7 v2 addition).
            let snapshotStale = false;
            let snapshotDetail = "";
            const snapPath = path.join("artifact", "daily-pipeline", "framework-research", "latest.json");
            if (process.env.DOWNLOAD_FAILED === "true") {
              snapshotDetail = "Snapshot artifact download failed; treating as unknown (not flagging).";
            } else if (!fs.existsSync(snapPath)) {
              snapshotStale = true;
              snapshotDetail = "Snapshot `latest.json` missing from latest artifact.";
            } else {
              try {
                const snap = JSON.parse(fs.readFileSync(snapPath, "utf8"));
                const generatedAt = snap.generated_at || "";
                if (!generatedAt) {
                  snapshotStale = true;
                  snapshotDetail = "Snapshot has no `generated_at` timestamp.";
                } else {
                  const ageMs = now - Date.parse(generatedAt);
                  const ageHours = Math.floor(ageMs / (60 * 60 * 1000));
                  if (ageMs > staleMs) {
                    snapshotStale = true;
                    snapshotDetail = `Framework-research snapshot is stale (${ageHours}h old).`;
                  } else {
                    snapshotDetail = `Framework-research snapshot is fresh (${ageHours}h old).`;
                  }
                }
              } catch (err) {
                snapshotStale = true;
                snapshotDetail = `Snapshot parse failed: ${err.message}`;
              }
            }

            const isStale = workflowStale || snapshotStale;
            const detail = `${workflowDetail} ${snapshotDetail}`.trim();

            const label = "bridge-watchdog";
            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: label,
              per_page: 100,
            });
            const existingIssues = openIssues.data.filter((issue) => issue.title.includes("Bridge Maintenance Stale"));
            const existing = existingIssues[0];

            if (isStale && !existing) {
              const body = [
                "Bridge maintenance appears stale.",
                "",
                `Workflow check: ${workflowDetail}`,
                `Snapshot check: ${snapshotDetail}`,
                "",
                `Workflow file checked: ${workflowId}`,
                `Threshold: ${staleHours} hours`,
                "",
                "Please review `.github/workflows/bridge-maintenance.yml` and `scripts/run_daily_bridge_maintenance.sh`.",
                "If only the snapshot check fired, the workflow ran but its non-critical",
                "upstream-research stage failed. Inspect the latest `tmp/bridge-maintenance/summary.md`",
                "and the run logs for the 'Upstream research: Claude Code sub-agents' row.",
              ].join("\n");

              await github.rest.issues.create({
                owner,
                repo,
                title: "Bridge Maintenance Stale",
                body,
                labels: [label],
              });
              core.notice(`Opened stale bridge maintenance issue. ${detail}`);
            } else if (isStale && existing) {
              core.notice(`Stale condition detected, existing issue already open. ${detail}`);
            } else if (!isStale && existing) {
              for (const issue of existingIssues) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: `Watchdog check passed: ${detail} Closing this stale alert issue.`,
                });
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: "closed",
                });
              }
              core.notice(`Fresh condition detected; closed ${existingIssues.length} stale issue(s).`);
            } else {
              core.notice(detail);
            }
