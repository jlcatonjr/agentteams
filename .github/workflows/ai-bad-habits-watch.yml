name: AI Bad-Habits Catalog Sync (Supervised PR)

# Catalog-sync guard for the AI bad-habits catalog (code-quality / correctness /
# process habits). The catalog is CURATED and version-controlled in
# agentteams/ai_bad_habits.py — there is NO upstream watch (security taxonomies
# are @security's domain). This workflow regenerates the committed artifact from
# source and opens an `awaiting-human` PR only if it drifted (i.e. a maintainer
# edited ai_bad_habits.py without regenerating the reference).
#
# The committed artifact is the TRACKED file references/ai-bad-habits-watch.md
# (the .github/agents/ tree is gitignored/generated and cannot be committed).
# Source of truth: agentteams/ai_bad_habits.py.
#
# Policy: this is a GUIDANCE change (it alters @code-hygiene documentation), so
# it mirrors advisory-pr.yml — NO auto-merge, operator reviews and decides.
# Plan: references/plans/ai-bad-habits-refocus-2026-06-02.plan.md

on:
  # Dispatch-only: a curated catalog has nothing to poll daily. Run manually
  # after editing the catalog source to open the regeneration PR.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  # issues: write is required for `gh label create` (labels are an issues-API
  # resource); contents/pull-requests alone return 403 on label creation.
  issues: write

jobs:
  watch-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: pip install -e ".[test]"

      - name: Produce catalog-sync proposal (regenerate from curated source)
        id: propose
        run: |
          python scripts/research_ai_bad_habits.py --propose
          proposal=tmp/daily-pipeline/ai-bad-habits/proposal.json
          if [[ ! -s "$proposal" ]]; then
            echo "no_proposal=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changes=$(python -c "import json; print(len(json.load(open('$proposal'))['changes']))")
          phash=$(python -c "import json; print(json.load(open('$proposal')).get('dedup_hash','unknown'))")
          if [[ "$changes" -eq 0 ]]; then
            echo "no_proposal=true" >> "$GITHUB_OUTPUT"
          else
            echo "phash=$phash" >> "$GITHUB_OUTPUT"
            echo "branch=auto/bad-habits-$phash" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing open PR with same hash
        if: steps.propose.outputs.no_proposal != 'true'
        id: dedupe
        env:
          GH_TOKEN: ${{ github.token }}
          PHASH: ${{ steps.propose.outputs.phash }}
        run: |
          existing=$(gh pr list --state open --search "head:auto/bad-habits-$PHASH" --json number --jq '.[0].number // empty')
          if [[ -n "$existing" ]]; then
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
            echo "Existing open PR #$existing matches watch hash $PHASH; skipping."
          fi

      - name: Ensure bad-habits-watch label exists
        if: steps.propose.outputs.no_proposal != 'true' && steps.dedupe.outputs.duplicate != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "bad-habits-watch" \
            --color "5319E7" \
            --description "Daily AI bad-habits catalog drift (awaits operator review)" \
            --force

      - name: Apply proposal on branch
        if: steps.propose.outputs.no_proposal != 'true' && steps.dedupe.outputs.duplicate != 'true'
        env:
          AGENTTEAMS_ALLOW_CI_APPLY: "1"
          BRANCH: ${{ steps.propose.outputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          python scripts/research_ai_bad_habits.py --apply
          git add -- references/ai-bad-habits-watch.md
          if git diff --cached --quiet; then
            echo "Apply produced no diff; exiting."
            exit 0
          fi
          git commit -m "auto(bad-habits): regenerate AI bad-habits catalog ($BRANCH)" \
                     -m "Generated by .github/workflows/ai-bad-habits-watch.yml. The committed catalog reference drifted from the curated source in agentteams/ai_bad_habits.py and was regenerated. Awaiting operator review — no auto-merge."
          git push --set-upstream origin "$BRANCH"

      - name: Open PR (no auto-merge — operator review required)
        if: steps.propose.outputs.no_proposal != 'true' && steps.dedupe.outputs.duplicate != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.propose.outputs.branch }}
          PHASH: ${{ steps.propose.outputs.phash }}
        run: |
          if ! git ls-remote --exit-code origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH was not pushed; nothing to PR."
            exit 0
          fi
          body_file="$(mktemp)"
          {
            echo "Generated by \`.github/workflows/ai-bad-habits-watch.yml\`."
            echo
            echo "The committed AI bad-habits catalog reference drifted from the"
            echo "curated source (\`agentteams/ai_bad_habits.py\`) and was regenerated."
            echo
            echo "**Review required (this alters @code-hygiene guidance):**"
            echo "- Diff confirms only \`references/ai-bad-habits-watch.md\` changed."
            echo "- Changes reflect a deliberate catalog edit in \`ai_bad_habits.py\`."
            echo "- Catalog stays scoped to code-quality/correctness/process habits;"
            echo "  security-class habits remain @security's domain."
            echo
            echo "Hash: \`$PHASH\`"
          } > "$body_file"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "auto: regenerate AI bad-habits catalog ($PHASH)" \
            --body-file "$body_file" \
            --label "bad-habits-watch" \
            --label "awaiting-human"
          # Intentionally NOT calling 'gh pr merge'. Guidance change → operator review.

      - name: Emit step summary
        if: always()
        env:
          NO_PROPOSAL: ${{ steps.propose.outputs.no_proposal }}
          DUPLICATE: ${{ steps.dedupe.outputs.duplicate }}
          PHASH: ${{ steps.propose.outputs.phash }}
        run: |
          {
            echo "## AI bad-habits catalog sync run"
            echo
            if [[ "$NO_PROPOSAL" == "true" ]]; then
              echo "Catalog reference in sync with source — no PR opened."
            elif [[ "$DUPLICATE" == "true" ]]; then
              echo "Drift matches an existing open PR (\`$PHASH\`); no new PR opened."
            else
              echo "Opened \`awaiting-human\` PR for watch hash \`$PHASH\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
