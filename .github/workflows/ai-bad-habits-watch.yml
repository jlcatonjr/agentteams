name: AI Bad-Habits Watch (Supervised PR)

# Daily living-catalog check for bad coding habits common across AI agents,
# drawn ONLY from maintained upstream catalogs (CWE Top 25, OWASP LLM Top 10,
# OWASP Web Top 10). Opens an `awaiting-human` PR when an upstream edition
# drifts from its pinned version (online probe) or the local catalog changes.
#
# The committed artifact is the TRACKED file references/ai-bad-habits-watch.md
# (the .github/agents/ tree is gitignored/generated and cannot be committed).
# Source of truth for editions + catalog: agentteams/ai_bad_habits.py.
#
# Policy: this is a GUIDANCE change (it alters @code-hygiene / @security
# documentation), so it mirrors advisory-pr.yml — NO auto-merge, operator
# reviews and decides. Plan: references/plans/ai-bad-habits-watch-2026-06-02.plan.md
#
# Cron 13:09 UTC is deliberately distinct from bridge (05:41), watchdog (06:11),
# framework (07:23), advisory (07:47), and pr-reminders (08:00).

on:
  # NOTE: the daily schedule is intentionally DISABLED until the first manual
  # `workflow_dispatch` run is reviewed (P3 validation gate). Re-enable by
  # uncommenting the cron below AFTER a clean dispatch run on main.
  # schedule:
  #   - cron: "13 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  # issues: write is required for `gh label create` (labels are an issues-API
  # resource); contents/pull-requests alone return 403 on label creation.
  issues: write

jobs:
  watch-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: pip install -e ".[test]"

      - name: Produce watch proposal (online probe of upstream editions)
        id: propose
        run: |
          python scripts/research_ai_bad_habits.py --propose --online
          proposal=tmp/daily-pipeline/ai-bad-habits/proposal.json
          if [[ ! -s "$proposal" ]]; then
            echo "no_proposal=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changes=$(python -c "import json; print(len(json.load(open('$proposal'))['changes']))")
          phash=$(python -c "import json; print(json.load(open('$proposal')).get('dedup_hash','unknown'))")
          if [[ "$changes" -eq 0 ]]; then
            echo "no_proposal=true" >> "$GITHUB_OUTPUT"
          else
            echo "phash=$phash" >> "$GITHUB_OUTPUT"
            echo "branch=auto/bad-habits-$phash" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing open PR with same hash
        if: steps.propose.outputs.no_proposal != 'true'
        id: dedupe
        env:
          GH_TOKEN: ${{ github.token }}
          PHASH: ${{ steps.propose.outputs.phash }}
        run: |
          existing=$(gh pr list --state open --search "head:auto/bad-habits-$PHASH" --json number --jq '.[0].number // empty')
          if [[ -n "$existing" ]]; then
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
            echo "Existing open PR #$existing matches watch hash $PHASH; skipping."
          fi

      - name: Ensure bad-habits-watch label exists
        if: steps.propose.outputs.no_proposal != 'true' && steps.dedupe.outputs.duplicate != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "bad-habits-watch" \
            --color "5319E7" \
            --description "Daily AI bad-habits catalog drift (awaits operator review)" \
            --force

      - name: Apply proposal on branch
        if: steps.propose.outputs.no_proposal != 'true' && steps.dedupe.outputs.duplicate != 'true'
        env:
          AGENTTEAMS_ALLOW_CI_APPLY: "1"
          BRANCH: ${{ steps.propose.outputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          python scripts/research_ai_bad_habits.py --apply
          git add -- references/ai-bad-habits-watch.md
          if git diff --cached --quiet; then
            echo "Apply produced no diff; exiting."
            exit 0
          fi
          git commit -m "auto(bad-habits): upstream edition drift in AI bad-habits watch ($BRANCH)" \
                     -m "Generated by .github/workflows/ai-bad-habits-watch.yml. An upstream catalog edition no longer matches its pinned version, or the local catalog changed. Awaiting operator review — no auto-merge. Confirm the new edition and bump the pinned version in agentteams/ai_bad_habits.py if appropriate."
          git push --set-upstream origin "$BRANCH"

      - name: Open PR (no auto-merge — operator review required)
        if: steps.propose.outputs.no_proposal != 'true' && steps.dedupe.outputs.duplicate != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.propose.outputs.branch }}
          PHASH: ${{ steps.propose.outputs.phash }}
        run: |
          if ! git ls-remote --exit-code origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH was not pushed; nothing to PR."
            exit 0
          fi
          body_file="$(mktemp)"
          {
            echo "Generated by \`.github/workflows/ai-bad-habits-watch.yml\`."
            echo
            echo "The daily AI bad-habits watch detected a change: an upstream"
            echo "catalog edition (CWE Top 25 / OWASP LLM Top 10 / OWASP Web Top 10)"
            echo "drifted from its pinned version, or the local catalog changed."
            echo
            echo "**Review required (this alters @code-hygiene / @security guidance):**"
            echo "- Diff confirms only \`references/ai-bad-habits-watch.md\` changed."
            echo "- If a source shows \`⚠️ review\`, confirm the new upstream edition"
            echo "  and bump the pinned \`version\` in \`agentteams/ai_bad_habits.py\`,"
            echo "  then re-run the script so the watch returns to \`tracking\`."
            echo "- BH→rule cross-links remain verified (no attribution drift)."
            echo
            echo "Hash: \`$PHASH\`"
          } > "$body_file"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "auto: AI bad-habits watch drift ($PHASH)" \
            --body-file "$body_file" \
            --label "bad-habits-watch" \
            --label "awaiting-human"
          # Intentionally NOT calling 'gh pr merge'. Guidance change → operator review.

      - name: Emit step summary
        if: always()
        env:
          NO_PROPOSAL: ${{ steps.propose.outputs.no_proposal }}
          DUPLICATE: ${{ steps.dedupe.outputs.duplicate }}
          PHASH: ${{ steps.propose.outputs.phash }}
        run: |
          {
            echo "## AI bad-habits watch run"
            echo
            if [[ "$NO_PROPOSAL" == "true" ]]; then
              echo "No catalog/edition drift today — no PR opened."
            elif [[ "$DUPLICATE" == "true" ]]; then
              echo "Drift matches an existing open PR (\`$PHASH\`); no new PR opened."
            else
              echo "Opened \`awaiting-human\` PR for watch hash \`$PHASH\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
